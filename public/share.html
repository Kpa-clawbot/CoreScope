<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Health Check Results — CoreScope</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body { font-family: system-ui, sans-serif; padding: 1rem 2rem; max-width: 900px; margin: 0 auto; }
    .share-header { margin-bottom: 1.5rem; }
    .share-header h1 { font-size: 1.4rem; margin: 0 0 0.25rem; }
    .share-code { font-family: monospace; font-size: 1.1rem; color: #888; }
    .hc-score-label { font-weight: 700; font-size: 1.1rem; }
    .hc-score-very-healthy { color: #16a34a; }
    .hc-score-good { color: #65a30d; }
    .hc-score-fair { color: #d97706; }
    .hc-score-poor { color: #dc2626; }
    #share-map { height: 320px; border-radius: 6px; margin: 1rem 0; }
    .hc-tl-row { display: flex; align-items: center; gap: 0.5rem; margin: 4px 0; }
    .hc-tl-name { min-width: 140px; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hc-tl-bar-wrap { flex: 1; background: #e5e7eb; border-radius: 2px; height: 12px; }
    .hc-tl-bar { background: #3b82f6; height: 100%; border-radius: 2px; min-width: 2px; }
    .hc-tl-snr { font-size: 0.75rem; color: #6b7280; min-width: 50px; text-align: right; }
    .share-error { padding: 2rem; text-align: center; color: #dc2626; }
    .share-loading { padding: 2rem; text-align: center; color: #6b7280; }
  </style>
</head>
<body>
  <div id="share-loading" class="share-loading">Loading results…</div>
  <div id="share-content" style="display:none">
    <div class="share-header">
      <h1>Mesh Health Check Results</h1>
      <div class="share-code" id="share-code"></div>
    </div>
    <div id="share-score"></div>
    <div id="share-map"></div>
    <h3>Receipt timeline</h3>
    <div id="share-timeline"></div>
  </div>
  <div id="share-error" class="share-error" style="display:none">
    Results not found or have expired.
  </div>

  <script>
  (async function () {
    'use strict';

    const id = location.pathname.split('/').filter(Boolean).pop();
    const loadingEl = document.getElementById('share-loading');
    const contentEl = document.getElementById('share-content');
    const errorEl   = document.getElementById('share-error');

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    if (!id) {
      loadingEl.style.display = 'none';
      errorEl.style.display = 'block';
      return;
    }

    let sess;
    try {
      const res = await fetch('/api/health/sessions/' + encodeURIComponent(id));
      if (!res.ok) {
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        return;
      }
      sess = await res.json();
    } catch (e) {
      loadingEl.style.display = 'none';
      errorEl.style.display = 'block';
      return;
    }

    loadingEl.style.display = 'none';
    contentEl.style.display = 'block';

    // Code
    document.getElementById('share-code').textContent = sess.code || '';
    document.title = 'Health Check ' + (sess.code || '') + ' — CoreScope';

    // Score
    const receipts = sess.receipts || [];
    const seen = new Set(receipts.map(r => r.observerKey)).size;
    // When an allowlist was used, we know the expected count and can show a percentage.
    // Without an allowlist, the denominator is the active observer pool at test time,
    // which is not stored in the session — show a count-only label instead.
    const hasAllowlist = sess.allowlistEnabled && sess.expectedObserverKeys && sess.expectedObserverKeys.length > 0;
    const expectedCount = hasAllowlist ? sess.expectedObserverKeys.length : 0;
    const pct = hasAllowlist && expectedCount > 0 ? Math.round(seen / expectedCount * 100) : null;
    const label = pct !== null
      ? (pct >= 80 ? 'VERY HEALTHY' : pct >= 60 ? 'GOOD' : pct >= 30 ? 'FAIR' : 'POOR')
      : (seen > 0 ? 'RECEIVED' : 'NO RECEIPTS');
    const labelClass = pct !== null ? ('hc-score-' + label.toLowerCase().replace(/\s+/g, '-')) : '';

    const scoreEl = document.getElementById('share-score');
    const pctText = pct !== null
      ? ' &mdash; ' + pct + '% (' + seen + '/' + expectedCount + ' observers)'
      : ' &mdash; ' + seen + ' observer' + (seen !== 1 ? 's' : '') + ' received';
    scoreEl.innerHTML = '<p><span class="hc-score-label ' + escHtml(labelClass) + '">' + escHtml(label) + '</span>' + pctText + '</p>';

    // Map — receipts don't carry coordinates, so show a text observer list instead
    const mapEl = document.getElementById('share-map');
    if (receipts.length === 0) {
      mapEl.style.display = 'none';
    } else {
      // Show a simple list of observers that received the message
      mapEl.style.height = 'auto';
      mapEl.innerHTML = '<ul style="margin:0;padding:0;list-style:none;">'
        + receipts.map(r => '<li style="padding:2px 0;font-size:0.9rem;">✓ ' + escHtml(r.observerName || r.observerKey) + '</li>').join('')
        + '</ul>';
    }

    // Timeline
    const sorted = [...receipts].sort((a, b) => a.firstSeenAt - b.firstSeenAt);
    const t0 = sorted.length ? sorted[0].firstSeenAt : 0;
    const tMax = sorted.length ? (sorted[sorted.length - 1].firstSeenAt - t0) || 1 : 1;

    const timelineEl = document.getElementById('share-timeline');
    if (sorted.length === 0) {
      timelineEl.innerHTML = '<p style="color:#6b7280">No receipts recorded.</p>';
    } else {
      timelineEl.innerHTML = sorted.map(function (r) {
        const pctBar = tMax > 0 ? ((r.firstSeenAt - t0) / tMax * 100) : 0;
        const name = r.observerName || (r.observerKey.slice(0, 12) + '…');
        return '<div class="hc-tl-row">'
          + '<span class="hc-tl-name">' + escHtml(name) + '</span>'
          + '<div class="hc-tl-bar-wrap"><div class="hc-tl-bar" style="width:' + Math.max(2, pctBar).toFixed(1) + '%"></div></div>'
          + '<span class="hc-tl-snr">' + (r.snr ? r.snr.toFixed(1) + ' dB' : '') + '</span>'
          + '</div>';
      }).join('');
    }
  })();
  </script>
</body>
</html>
