# Mosquitto config for MeshCore Analyzer (CoreScope-EVO)
#
# Two listeners:
#   1883 — external, password-authenticated. Observer nodes publish here.
#   1884 — internal, anonymous, bound to localhost only. The in-container
#          ingestor connects here; never exposed outside the container.
per_listener_settings true

persistence true
persistence_location /var/lib/mosquitto/

log_dest stdout
log_type warning
log_type error

# External listener — observers authenticate with the password file.
listener 1883
allow_anonymous false
password_file /etc/mosquitto/passwd

# Internal listener — local ingestor only, anonymous, not port-mapped.
listener 1884 127.0.0.1
allow_anonymous true
