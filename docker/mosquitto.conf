# Safer default: local-only broker, no anonymous remote access.
listener 1883 127.0.0.1
allow_anonymous false
password_file /etc/mosquitto/passwd
acl_file /etc/mosquitto/acl

persistence true
persistence_location /var/lib/mosquitto/

# CoreScope-compatible topics
# Bridge publishes under: msh/US/<region>/2/e/<observer>
# Optional direct companion topic: meshcore/message/direct/<id>
topic msh/# both 0
topic meshcore/# both 0
