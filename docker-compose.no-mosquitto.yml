services:
  postgres:
    image: postgres:16-alpine
    container_name: corescope-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-corescope}
      POSTGRES_USER: ${POSTGRES_USER:-corescope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-corescope-change-me}
    volumes:
      - ${PROD_POSTGRES_DATA_DIR:-~/meshcore-postgres-data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-corescope} -d ${POSTGRES_DB:-corescope}"]
      interval: 10s
      timeout: 5s
      retries: 5

  prod:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-unknown}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: corescope:latest
    container_name: corescope-prod
    restart: unless-stopped
    stop_grace_period: 30s
    stop_signal: SIGTERM
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PROD_HTTP_PORT:-80}:80"
      - "${PROD_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy-config/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${PROD_DATA_DIR:-~/meshcore-data}:/app/data
      - caddy-data:/data/caddy
    environment:
      - NODE_ENV=production
      - DB_DRIVER=${DB_DRIVER:-postgres}
      - DATABASE_URL=${DATABASE_URL:-postgres://corescope:corescope-change-me@postgres:5432/corescope?sslmode=disable}
      - DB_PATH=${DB_PATH:-/app/data/meshcore.db}
      - DISABLE_MOSQUITTO=true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/stats"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caddy-data:
