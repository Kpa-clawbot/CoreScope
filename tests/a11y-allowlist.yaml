# a11y allowlist — operator-flagged false-positives or temporary suppressions.
#
# Each entry MUST cite a GH issue # that tracks the eventual fix.
# Format (YAML list of objects):
#
#   - route: '/some/route'           # exact hash route, e.g. '/' or '/analytics?tab=channels'
#     selector: '.some-css-selector' # axe-core "target" string for the violation node
#     rule: color-contrast           # axe rule id (M5 = only color-contrast)
#     issue: 1234                    # GH issue tracking the fix
#     expires_at: 2026-09-01         # YYYY-MM-DD; after this date the suppression
#                                    # is refused and the test fails again — forces a revisit
#
# Rules:
#   - Suppression matches when route + rule + (any of) selector strings all match.
#   - Missing issue or expires_at = refused (treated as no allowlist match).
#   - Expired expires_at = warning logged, suppression refused.
#
# Current entries (added by PR #1711): 320 a11y color-contrast violations
# exposed by adding 8 missing analytics routes to M5/M6 coverage.
# Each entry has a dedicated tracking issue (#1713-#1718) that owns
# the underlying contrast fix; removing the fix removes only its own
# allowlist entries.

